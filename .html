<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="max-w-4xl mx-auto bg-white border border-gray-100 rounded-lg shadow-sm p-6 relative group">
    
    <button class="absolute top-4 right-4 p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors border border-gray-100 shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
    </button>

    <div class="mb-4">
        <h2 class="text-xl font-bold text-blue-900 hover:underline cursor-pointer inline-block">Mobile First Corp</h2>
        <p class="text-gray-500 font-medium text-lg mt-1">React Native Developer</p>
    </div>

    <div class="flex items-center gap-2 text-gray-500 text-sm mb-4">
        <span>Remote</span>
        <span class="text-gray-300">•</span>
        <span>Full-time</span>
        <span class="text-gray-300">•</span>
        <span>$130,000 - $175,000</span>
    </div>

    <div class="mb-4">
        <span class="bg-blue-50 text-blue-900 text-xs font-bold px-3 py-1 rounded uppercase tracking-wider">
            Not Applied
        </span>
    </div>

    <p class="text-gray-600 text-sm leading-relaxed mb-6">
        Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.
    </p>

    <div class="flex items-center gap-3">
        <button class="px-6 py-2 border-2 border-emerald-400 text-emerald-500 font-bold rounded-lg hover:bg-emerald-50 transition-all uppercase text-sm tracking-wide">
            Interview
        </button>
        
        <button class="px-6 py-2 border-2 border-red-300 text-red-500 font-bold rounded-lg hover:bg-red-50 transition-all uppercase text-sm tracking-wide">
            Rejected
        </button>
    </div>
</div>
</body>
</html>
